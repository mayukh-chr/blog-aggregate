# Blog sources for aggregation.
#
# type: auto   — try RSS detection first, fall back to scrape
#        rss   — use feedparser directly on rss_url (or auto-detect from url)
#        scrape — use HTML scraping with the selectors below
#
# For scrape sources, selectors.articles should match <a> tags.
# selectors.date is looked up as a sibling/ancestor of each article link.
# date_format uses strptime notation, or "iso" for ISO 8601.
# requires_js: true adds a Playwright fallback (disabled by default).

sources:

