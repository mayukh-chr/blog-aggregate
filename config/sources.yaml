# Blog sources for aggregation.
#
# type: auto   — try RSS detection first, fall back to scrape
#        rss   — use feedparser directly on rss_url (or auto-detect from url)
#        scrape — use HTML scraping with the selectors below
#
# disabled: true — skip this source entirely
# rss_url — use this feed URL directly, skipping the 10-probe detection loop
#
# For scrape sources, selectors.articles should match <a> tags.
# selectors.date is looked up as a sibling/ancestor of each article link.
# date_format uses strptime notation, or "iso" for ISO 8601.

sources:

  # ── Personal blogs ──────────────────────────────────────────────────────────

  - name: "David Imel"
    url: "https://www.davidimel.com/writing/"
    type: auto

  - name: "Karan Sharma"
    url: "https://mrkaran.dev/"
    type: rss
    rss_url: "https://mrkaran.dev/posts/atom.xml"

  - name: "Kailash Nadh"
    url: "https://nadh.in/"
    type: auto

  - name: "Yashaswi Mishra"
    url: "https://www.pixperk.tech/"
    type: auto

  - name: "Mrinal Pramanick"
    url: "https://mrinals-vault.xyz/"
    disabled: true  # JS-rendered — static scrape returns 0 elements

  - name: "Andrej Karpathy"
    url: "https://karpathy.bearblog.dev/blog/"
    type: auto

  - name: "Arpit Bhayani"
    url: "https://arpitbhayani.me/blogs"
    type: auto

  - name: "Aiden Bai"
    url: "https://www.aidenybai.com/"
    disabled: true  # JS-rendered Next.js — no RSS, no static article HTML

  - name: "Mitchell Hashimoto"
    url: "https://mitchellh.com/"
    type: auto

  # ── Company engineering blogs ────────────────────────────────────────────────

  - name: "Frappe"
    url: "https://frappe.io/blog"
    type: auto

  - name: "Uber Engineering"
    url: "https://www.uber.com/en-US/blog/engineering/"
    disabled: true  # 406 Not Acceptable — rejects non-browser requests

  - name: "Bloomberg Engineering"
    url: "https://www.bloomberg.com/company/stories/category/tech-at-bloomberg/"
    disabled: true  # 403 Forbidden — hard bot block

  - name: "Databricks"
    url: "https://www.databricks.com/blog/category/engineering"
    type: auto

  - name: "Stripe Engineering"
    url: "https://stripe.com/blog/engineering"
    type: scrape
    selectors:
      articles: "article.BlogIndexPost h1 a.BlogIndexPost__titleLink"
      date: "time.BlogIndexPost__date"

  - name: "Confluent"
    url: "https://www.confluent.io/blog/area/technology/"
    type: auto

  - name: "Cloudflare"
    url: "https://blog.cloudflare.com/tag/engineering/"
    type: auto

  - name: "Palantir"
    url: "https://blog.palantir.com/subpage/f23bccc2b690"
    type: auto

  - name: "ByteDance / Seed"
    url: "https://seed.bytedance.com/en/blog"
    disabled: true  # JS-rendered Modern.js — static scrape returns nav junk

  - name: "Waymo"
    url: "https://waymo.com/blog/search/?t=Technology"
    disabled: true  # JS-rendered search results — static scrape returns nav junk

  - name: "Nvidia Developer"
    url: "https://developer.nvidia.com/blog/"
    type: auto

  - name: "HuggingFace"
    url: "https://huggingface.co/blog"
    type: auto
